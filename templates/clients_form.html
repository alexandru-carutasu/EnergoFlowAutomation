{% extends "base.html" %}
{% block title %}{{ "Editează" if client else "Adaugă" }} Client – EnergoFlow{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ "✏️ Editează Client" if client else "➕ Client Nou" }}</h1>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label for="name">Nume Client</label>
            <input type="text" id="name" name="name" value="{{ client.name if client else '' }}" required placeholder="ex: Enel Green Power">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ client.email if client else '' }}" required placeholder="ex: dispatch@enel.ro">
        </div>

        <div class="form-group">
            <label for="num_plants">Număr Parcuri</label>
            <input type="number" id="num_plants" name="num_plants" value="{{ client.num_plants if client else 0 }}" min="0">
        </div>

        <div class="form-group">
            <div class="form-check">
                <input type="checkbox" id="has_prod" name="has_prod" {{ 'checked' if client and client.has_prod }}>
                <label for="has_prod" style="text-transform:none; font-size:0.9rem; color:var(--text)">Trimite și date de producție</label>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">💾 {{ "Salvează" if client else "Adaugă" }}</button>
            <a href="{{ url_for('main.clients_list') }}" class="btn btn-ghost">Anulează</a>
        </div>
    </form>
</div>
{% endblock %}
