{% extends "base.html" %}
{% block title %}{{ "Editează" if plant else "Adaugă" }} Parc – EnergoFlow{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ "✏️ Editează Parc" if plant else "➕ Parc Nou" }}</h1>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label for="name">Nume Parc</label>
            <input type="text" id="name" name="name" value="{{ plant.name if plant else '' }}" required placeholder="ex: Parc Eolian Cogealac">
        </div>

        <div class="form-group">
            <label for="client_id">Client</label>
            <select id="client_id" name="client_id" required>
                <option value="">– Selectează client –</option>
                {% for c in clients %}
                <option value="{{ c.id }}" {{ 'selected' if plant and plant.client_id == c.id }}>{{ c.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="max_pwr">Putere Maximă (MW)</label>
            <input type="number" id="max_pwr" name="max_pwr" step="0.01" value="{{ plant.max_pwr if plant else '' }}" required placeholder="ex: 50.00">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">💾 {{ "Salvează" if plant else "Adaugă" }}</button>
            <a href="{{ url_for('main.plants_list') }}" class="btn btn-ghost">Anulează</a>
        </div>
    </form>
</div>
{% endblock %}
